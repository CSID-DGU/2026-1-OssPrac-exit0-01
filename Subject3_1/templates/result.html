<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Result</title>
    <style>
        body { font-family: sans-serif; padding: 30px; }
        table { border-collapse: collapse; width: 400px; }
        th, td { border: 1px solid #ccc; padding: 10px 16px; text-align: center; }
        th { background: #f4f4f4; }
        a { display: inline-block; margin-top: 16px; text-decoration: none; color: #4a90e2; }
    </style>
</head>
<body>
    <table>
        <tr><th>Name</th><td>{{ name }}</td></tr>
        <tr><th>StudentNumber</th><td>{{ student_number }}</td></tr>
        <tr><th>Gender</th><td>{{ gender }}</td></tr>
        <tr><th>Major</th><td>{{ major }}</td></tr>
        <tr><th>languages</th><td>{{ languages | join(', ') }}</td></tr>
    </table>
    <a href="/">← 돌아가기</a>
</body>
</html>
