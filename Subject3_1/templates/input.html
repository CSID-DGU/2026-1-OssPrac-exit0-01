<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Student Info Form</title>
    <style>
        body { font-family: sans-serif; padding: 30px; }
        .form-group { margin-bottom: 16px; }
        label { display: block; margin-bottom: 4px; }
        input[type="text"] { padding: 6px 10px; width: 260px; border: 1px solid #ccc; border-radius: 4px; }
        .radio-group, .checkbox-group { display: flex; gap: 16px; margin-top: 4px; }
        .radio-group label, .checkbox-group label { display: flex; align-items: center; gap: 5px; }
        button { padding: 8px 20px; margin-top: 8px; cursor: pointer; }
    </style>
</head>
<body>
    <form action="/result" method="POST">
        <div class="form-group">
            <label>Name</label>
            <input type="text" name="name" required>
        </div>
        <div class="form-group">
            <label>Student Number</label>
            <input type="text" name="student_number" required>
        </div>
        <div class="form-group">
            <label>Gender</label>
            <div class="radio-group">
                <label><input type="radio" name="gender" value="Male"> Male</label>
                <label><input type="radio" name="gender" value="Female"> Female</label>
            </div>
        </div>
        <div class="form-group">
            <label>Major</label>
            <input type="text" name="major" required>
        </div>
        <div class="form-group">
            <label>Programming Languages</label>
            <div class="checkbox-group">
                <label><input type="checkbox" name="languages" value="Python"> Python</label>
                <label><input type="checkbox" name="languages" value="Java"> Java</label>
                <label><input type="checkbox" name="languages" value="HTML"> HTML</label>
                <label><input type="checkbox" name="languages" value="C++"> C++</label>
            </div>
        </div>
        <button type="submit">submit</button>
    </form>
</body>
</html>
