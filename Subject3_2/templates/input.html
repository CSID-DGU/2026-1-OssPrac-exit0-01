<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>팀원 정보 입력</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #f8fafc, #e0f2fe);
            color: #1f2937;
            font-family: "Segoe UI", Arial, sans-serif;
            min-height: 100vh;
        }

        .navbar {
            background-color: #0f172a;
        }

        .navbar-brand,
        .nav-link {
            color: #f8fafc !important;
        }

        .form-section {
            padding: 110px 0 60px;
        }

        .form-card {
            background-color: white;
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 14px 40px rgba(15, 23, 42, 0.12);
            border: 1px solid #e2e8f0;
        }

        .form-title {
            font-weight: 800;
            color: #0f172a;
        }

        .form-text {
            text-align: justify;
            line-height: 1.8;
            color: #475569;
        }

        .btn-startup {
            background-color: #0284c7;
            color: white;
            border-radius: 12px;
            padding: 10px 20px;
            font-weight: 600;
            border: none;
        }

        .btn-startup:hover {
            background-color: #0369a1;
            color: white;
        }

        footer {
            background-color: #0f172a;
            color: #cbd5e1;
            text-align: center;
            padding: 25px 0;
            margin-top: 60px;
        }
    </style>
</head>

<body>

<nav class="navbar navbar-expand-lg fixed-top">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">OSS Team</a>

        <div class="ms-auto">
            <a href="/" class="btn btn-outline-light btn-sm">메인으로</a>
        </div>
    </div>
</nav>

<section class="form-section">
    <div class="container">
        <div class="form-card">
            <h1 class="form-title mb-3">팀원 정보 입력 페이지</h1>

            <p class="form-text mb-4">
                이 페이지는 오픈소스소프트웨어 프로젝트 팀원의 정보를 입력하기 위한 화면입니다.
                팀원의 이름, 역할, 기술 스택, 프로젝트 기여도, GitHub 주소, 이메일 정보를 입력하여
                팀 소개 웹 페이지의 데이터로 활용할 수 있습니다.
            </p>

            <form action="/result" method="post">
                <div class="mb-3">
                    <label class="form-label">이름</label>
                    <input type="text" name="name" class="form-control" placeholder="예: 한규민" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">역할</label>
                    <input type="text" name="role" class="form-control" placeholder="예: Backend Developer" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">기술 스택</label>
                    <input type="text" name="skills" class="form-control" placeholder="예: Python, Flask, Docker">
                </div>

                <div class="mb-3">
                    <label class="form-label">프로젝트 기여도</label>
                    <textarea name="contribution" class="form-control" rows="4" placeholder="예: input.html 수정 및 Dockerfile 작성"></textarea>
                </div>

                <div class="mb-3">
                    <label class="form-label">GitHub 주소</label>
                    <input type="url" name="github" class="form-control" placeholder="https://github.com/아이디">
                </div>

                <div class="mb-3">
                    <label class="form-label">이메일</label>
                    <input type="email" name="email" class="form-control" placeholder="example@email.com">
                </div>

                <button type="submit" class="btn-startup">
                    <i class="bi bi-send-fill"></i>
                    제출하기
                </button>
            </form>
        </div>
    </div>
</section>

<footer>
    <p class="mb-0">© 2026 OSS Team Project. Flask + Nginx Web Service.</p>
</footer>

</body>
</html>
